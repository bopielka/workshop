<div class="h-[75px] bg-(--secondary-9) flex items-center justify-between px-8">
    <div class="flex flex-col text-xs text-(--primary-5)">
        <span class="text-sm font-bold text-(--primary-2) mb-0.5">{{ 'contact' | translate }}</span>
        <span><b class="text-(--primary-3)">{{ 'owner_name' | translate }}</b></span>
        <span>{{ 'phone' | translate }}</span>
    </div>
    <div class="flex items-center gap-2">
        <div class="text-sm italic text-(--primary-4)">{{ 'created_by' | translate }}</div>
        <div class="hover-pointer" (click)="openLinkedInInNewWindow()">
            <nz-icon nzType="linkedin" nzTheme="outline" class="text-(--primary-4)"/>
        </div>
    </div>
</div>
