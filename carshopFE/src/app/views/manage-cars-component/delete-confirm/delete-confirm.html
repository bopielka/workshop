<div class="delete-confirm-actions">
    <button nz-button nzShape="round" (click)="cancel()">
        <nz-icon nzType="rollback" nzTheme="outline"/>
        {{ 'cancel' | translate }}
    </button>
    <button nz-button nzShape="round" nzType="primary" nzDanger (click)="confirm()">
        <nz-icon nzType="delete" nzTheme="outline"/>
        {{ 'remove_car_btn' | translate }}
    </button>
</div>
