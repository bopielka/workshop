server.port=${SERVER_PORT:8080}

spring.datasource.url=jdbc:postgresql://${DB_HOST:carshop-db}:${DB_PORT:5432}/${POSTGRES_DB}

spring.jpa.database-platform=${JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.hibernate.ddl-auto=${JPA_HIBERNATE_DDL_AUTO:none}
spring.jpa.properties.hibernate.default_schema=${APP_SCHEMA}

spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.locations=${FLYWAY_LOCATIONS:classpath:db/migration}
spring.flyway.create-schemas=${FLYWAY_CREATE_SCHEMAS:true}
spring.flyway.schemas=${APP_SCHEMA}
spring.flyway.default-schema=${APP_SCHEMA}
spring.flyway.validate-on-migrate=${FLYWAY_VALIDATE_ON_MIGRATE:true}
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:false}
spring.flyway.clean-disabled=${FLYWAY_CLEAN_DISABLED:true}
